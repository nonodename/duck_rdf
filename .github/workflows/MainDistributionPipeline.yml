#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-next-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    if: false   # extension-template is currently not compatible with main
    with:
      duckdb_version: main
      ci_tools_version: main
      extension_name: rdf

  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.0
    with:
      duckdb_version: v1.5.0
      ci_tools_version: v1.5.0
      extension_name: rdf

  format-check:
    name: Format Check
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@v1.5.0
    with:
      duckdb_version: v1.5.0
      ci_tools_version: v1.5.0
      extension_name: rdf
      format_checks: 'format'

  tidy-check:
    name: Tidy Check
    runs-on: ubuntu-24.04

    env:
      CC: gcc
      CXX: g++
      GEN: ninja
      TIDY_THREADS: 4

    steps:
      - uses: actions/checkout@v4
        name: Checkout current repository
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - uses: actions/checkout@v4
        name: Checkout Extension CI tools
        with:
          path: 'extension-ci-tools'
          ref: v1.5.0
          repository: duckdb/extension-ci-tools

      - name: Install
        shell: bash
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq ninja-build clang-tidy libcurl4-openssl-dev libxml2-dev
          sudo pip3 install pybind11[global] --break-system-packages

      - name: Tidy Check
        shell: bash
        run: make tidy-check
