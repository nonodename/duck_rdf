#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-next-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    if: false   # extension-template is currently not compatible with main
    with:
      duckdb_version: main
      ci_tools_version: main
      extension_name: rdf

  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.4
    with:
      # ci-tools @v1.5.3 carries the vcvars-path fix (extension-ci-tools#370) so
      # MSVC activates on the VS 2026 runner. duckdb v1.5-variegata carries the
      # fmt fix (duckdb#23238); switch to v1.5.4 once it is tagged.
      duckdb_version: v1.5.4
      ci_tools_version: v1.5.4
      extension_name: rdf

  format-check:
    name: Format Check
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_code_quality.yml@v1.5.5
    with:
      duckdb_version: v1.5.4
      ci_tools_version: v1.5.4
      extension_name: rdf
      format_checks: 'format'
  
  wasm-smoke-test:
    name: WASM Smoke Test
    needs: duckdb-stable-build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        name: Checkout current repository

      - uses: actions/download-artifact@v8
        name: Download WASM extension artifact
        with:
          name: rdf-v1.5.4-extension-wasm_eh
          path: wasm-build/

      - uses: actions/setup-node@v7
        name: Set up Node.js
        with:
          node-version: '20'

      - name: Install smoke-test dependencies
        run: npm ci
        working-directory: test/wasm-smoke-test

      - name: Run WASM smoke test
        run: |
          WASM_PATH=$(find ../../wasm-build -name '*.duckdb_extension.wasm' | head -1)
          echo "Using WASM extension: $WASM_PATH"
          node test-wasm-load.mjs "$WASM_PATH"
        working-directory: test/wasm-smoke-test

  tidy-check:
    name: Tidy Check
    runs-on: ubuntu-24.04

    env:
      CC: gcc
      CXX: g++
      GEN: ninja
      TIDY_THREADS: 4

    steps:
      - uses: actions/checkout@v7
        name: Checkout current repository
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - uses: actions/checkout@v7
        name: Checkout Extension CI tools
        with:
          path: 'extension-ci-tools'
          ref: v1.5.4
          repository: duckdb/extension-ci-tools

      - name: Install
        shell: bash
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq ninja-build clang-tidy libcurl4-openssl-dev libxml2-dev
          sudo pip3 install pybind11[global] --break-system-packages

      - name: Tidy Check
        shell: bash
        run: make tidy-check
